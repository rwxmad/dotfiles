[opener]

edit = [
	{ run = '$EDITOR "$@"', block = true, for = "unix" },
]

play = [
	{ run = "mpv %s", orphan = true, for = "unix" },
]

open = [
	{ run = "xdg-open %s", desc = "Open" },
]

open_pdf = [
	{ run = "sioyek %s", desc = "Open PDF" },
]

open_image = [
	{ run = "imv %s", orphan = true, desc = "Open image" },
]


[open]

prepend_rules = [
	{ mime = "video/*",  use = "play" },
	{ mime = "image/*",  use = "open_image" },
	{ url = "*.pdf",     use = "open_pdf" },
]
